version: '3.8'

services:
  app:
    build: .
    container_name: simple-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=main.py
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    volumes:
      - ./app:/app   # монтируем код для разработки (чтобы изменения применялись без пересборки)
      - /app/__pycache__  # исключаем кеш, чтобы не мешал
    restart: unless-stopped